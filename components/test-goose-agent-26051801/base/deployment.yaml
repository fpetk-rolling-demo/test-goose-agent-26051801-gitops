apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    tad.gitops.set/image: ".spec.template.spec.containers[0].image"
    tad.gitops.get/image: ".spec.template.spec.containers[0].image"
    tad.gitops.set/replicas: ".spec.replicas"
    tad.gitops.get/replicas: ".spec.replicas"
  labels:
    app.kubernetes.io/instance: test-goose-agent-26051801
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: test-goose-agent-26051801
  name: test-goose-agent-26051801
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: test-goose-agent-26051801
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: test-goose-agent-26051801
    spec:
      containers:
        - image: ${{ values.gooseImage }}
          name: goose-agent
          command: ["goose", "serve", "--host", "0.0.0.0", "--port", "3000"]
          env:
            - name: GOOSE_PROVIDER
              value: "${{ values.gooseProvider }}"
            - name: GOOSE_MODEL
              value: "${{ values.gooseModel }}"
          envFrom:
            - secretRef:
                name: ${{ values.name }}-provider-api-key
                optional: true
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
      restartPolicy: Always

